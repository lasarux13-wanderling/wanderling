<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wandermap</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap');
    
    :root {
      --bg-dark: #0a0e1a;
      --bg-darker: #050810;
      --surface: #1a1f35;
      --surface-light: #242b45;
      --accent: #e8b55f;
      --accent-light: #f5d89a;
      --text: #e8e9ed;
      --text-dim: #9fa1aa;
      --border: rgba(232, 181, 95, 0.15);
      --shadow: rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 50%, #0d1224 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      padding: 2rem 2rem 1rem;
      text-align: center;
      position: relative;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      padding: 1.5rem 2rem;
      flex-wrap: wrap;
    }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: var(--surface-light);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent) 0%, #d4a253 100%);
      color: var(--bg-dark);
      border: none;
      font-weight: 600;
    }

    button.primary:hover {
      background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
      transform: translateY(-2px) scale(1.02);
    }

    #globe-container {
      width: 100%;
      max-width: 800px;
      height: 500px;
      margin: 0 auto;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      background: radial-gradient(ellipse at center, rgba(26, 31, 53, 0.3) 0%, var(--bg-darker) 100%);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(5, 8, 16, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal h2 {
      font-family: 'Lora', serif;
      color: var(--accent);
      margin-bottom: 1.5rem;
      font-size: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 181, 95, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .modal-actions button {
      flex: 1;
    }

    .trips-list {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .trip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .trip-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .trip-card h3 {
      font-family: 'Lora', serif;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 1.25rem;
    }

    .trip-card .route {
      color: var(--text);
      font-size: 1.05rem;
      margin-bottom: 0.5rem;
    }

    .trip-card .dates {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-dim);
    }

    .empty-state p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    canvas {
      display: block;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-darker);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--surface-light);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Wandermap</h1>
    <p>Track your journeys across the globe</p>
  </div>

  <div class="controls">
    <button class="primary" onclick="openAddTrip()">+ Add Trip</button>
    <button onclick="viewTrips()">View All Trips</button>
    <button onclick="resetView()">Reset View</button>
  </div>

  <div id="globe-container"></div>

  <div id="trips-section" class="trips-list" style="display: none;">
    <h2 style="font-family: 'Lora', serif; color: var(--accent); margin-bottom: 1.5rem; font-size: 2rem;">Your Trips</h2>
    <div id="trips-container"></div>
  </div>

  <!-- Add Trip Modal -->
  <div id="add-modal" class="modal-overlay">
    <div class="modal">
      <h2>Add New Trip</h2>
      <form id="trip-form">
        <div class="form-group">
          <label for="trip-name">Trip Name</label>
          <input type="text" id="trip-name" required placeholder="e.g., Summer Europe Tour">
        </div>
        <div class="form-group">
          <label for="departure">Departure City</label>
          <input type="text" id="departure" required placeholder="e.g., New York">
        </div>
        <div class="form-group">
          <label for="destination">Destination City</label>
          <input type="text" id="destination" required placeholder="e.g., Paris">
        </div>
        <div class="form-group">
          <label for="start-date">Start Date</label>
          <input type="date" id="start-date" required>
        </div>
        <div class="form-group">
          <label for="end-date">End Date</label>
          <input type="date" id="end-date">
        </div>
        <div class="modal-actions">
          <button type="button" onclick="closeAddTrip()">Cancel</button>
          <button type="submit" class="primary">Save Trip</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // City coordinates database
    const cityCoords = {
      'new york': { lat: 40.7128, lng: -74.0060 },
      'london': { lat: 51.5074, lng: -0.1278 },
      'paris': { lat: 48.8566, lng: 2.3522 },
      'tokyo': { lat: 35.6762, lng: 139.6503 },
      'sydney': { lat: -33.8688, lng: 151.2093 },
      'dubai': { lat: 25.2048, lng: 55.2708 },
      'singapore': { lat: 1.3521, lng: 103.8198 },
      'hong kong': { lat: 22.3193, lng: 114.1694 },
      'los angeles': { lat: 34.0522, lng: -118.2437 },
      'san francisco': { lat: 37.7749, lng: -122.4194 },
      'miami': { lat: 25.7617, lng: -80.1918 },
      'barcelona': { lat: 41.3851, lng: 2.1734 },
      'rome': { lat: 41.9028, lng: 12.4964 },
      'amsterdam': { lat: 52.3676, lng: 4.9041 },
      'berlin': { lat: 52.5200, lng: 13.4050 },
      'madrid': { lat: 40.4168, lng: -3.7038 },
      'athens': { lat: 37.9838, lng: 23.7275 },
      'istanbul': { lat: 41.0082, lng: 28.9784 },
      'bangkok': { lat: 13.7563, lng: 100.5018 },
      'beijing': { lat: 39.9042, lng: 116.4074 },
      'shanghai': { lat: 31.2304, lng: 121.4737 },
      'mumbai': { lat: 19.0760, lng: 72.8777 },
      'delhi': { lat: 28.7041, lng: 77.1025 },
      'seoul': { lat: 37.5665, lng: 126.9780 },
      'mexico city': { lat: 19.4326, lng: -99.1332 },
      'rio de janeiro': { lat: -22.9068, lng: -43.1729 },
      'buenos aires': { lat: -34.6037, lng: -58.3816 },
      'cairo': { lat: 30.0444, lng: 31.2357 },
      'johannesburg': { lat: -26.2041, lng: 28.0473 },
      'moscow': { lat: 55.7558, lng: 37.6173 },
      'toronto': { lat: 43.6532, lng: -79.3832 },
      'vancouver': { lat: 49.2827, lng: -123.1207 },
      'montreal': { lat: 45.5017, lng: -73.5673 },
      'chicago': { lat: 41.8781, lng: -87.6298 },
      'seattle': { lat: 47.6062, lng: -122.3321 },
      'boston': { lat: 42.3601, lng: -71.0589 },
      'washington': { lat: 38.9072, lng: -77.0369 },
      'las vegas': { lat: 36.1699, lng: -115.1398 },
      'orlando': { lat: 28.5383, lng: -81.3792 },
      'lisbon': { lat: 38.7223, lng: -9.1393 },
      'vienna': { lat: 48.2082, lng: 16.3738 },
      'prague': { lat: 50.0755, lng: 14.4378 },
      'budapest': { lat: 47.4979, lng: 19.0402 },
      'warsaw': { lat: 52.2297, lng: 21.0122 },
      'stockholm': { lat: 59.3293, lng: 18.0686 },
      'copenhagen': { lat: 55.6761, lng: 12.5683 },
      'oslo': { lat: 59.9139, lng: 10.7522 },
      'helsinki': { lat: 60.1699, lng: 24.9384 },
      'reykjavik': { lat: 64.1466, lng: -21.9426 },
      'dublin': { lat: 53.3498, lng: -6.2603 },
      'edinburgh': { lat: 55.9533, lng: -3.1883 },
      'milan': { lat: 45.4642, lng: 9.1900 },
      'venice': { lat: 45.4408, lng: 12.3155 },
      'florence': { lat: 43.7696, lng: 11.2558 },
      'naples': { lat: 40.8518, lng: 14.2681 },
      'zurich': { lat: 47.3769, lng: 8.5417 },
      'geneva': { lat: 46.2044, lng: 6.1432 },
      'brussels': { lat: 50.8503, lng: 4.3517 },
      'frankfurt': { lat: 50.1109, lng: 8.6821 },
      'munich': { lat: 48.1351, lng: 11.5820 },
      'hamburg': { lat: 53.5511, lng: 9.9937 },
      'cologne': { lat: 50.9375, lng: 6.9603 }
    };

    // Storage functions
    function saveTrips(trips) {
      localStorage.setItem('wandermap_trips', JSON.stringify(trips));
    }

    function loadTrips() {
      const data = localStorage.getItem('wandermap_trips');
      return data ? JSON.parse(data) : [];
    }

    function getCityCoords(cityName) {
      const normalized = cityName.toLowerCase().trim();
      return cityCoords[normalized] || null;
    }

    // Three.js Globe Setup
    let scene, camera, renderer, globe, trips = [];
    let routeLines = [];

    function initGlobe() {
      const container = document.getElementById('globe-container');
      const width = container.clientWidth;
      const height = container.clientHeight;

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
      camera.position.z = 2.5;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(width, height);
      renderer.setClearColor(0x000000, 0);
      container.appendChild(renderer.domElement);

      // Create Earth
      const geometry = new THREE.SphereGeometry(1, 64, 64);
      const texture = createEarthTexture();
      const material = new THREE.MeshBasicMaterial({ map: texture });
      globe = new THREE.Mesh(geometry, material);
      scene.add(globe);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const pointLight = new THREE.PointLight(0xe8b55f, 0.8);
      pointLight.position.set(5, 3, 5);
      scene.add(pointLight);

      // Load and render saved trips
      trips = loadTrips();
      trips.forEach(trip => addRouteToGlobe(trip));

      animate();
    }

    function createEarthTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      // Ocean
      ctx.fillStyle = '#1a1f35';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Simplified continents
      ctx.fillStyle = '#2d3550';
      
      // North America
      ctx.beginPath();
      ctx.arc(400, 350, 200, 0, Math.PI * 2);
      ctx.fill();

      // South America
      ctx.beginPath();
      ctx.arc(500, 700, 150, 0, Math.PI * 2);
      ctx.fill();

      // Europe
      ctx.beginPath();
      ctx.arc(1050, 300, 120, 0, Math.PI * 2);
      ctx.fill();

      // Africa
      ctx.beginPath();
      ctx.arc(1100, 550, 180, 0, Math.PI * 2);
      ctx.fill();

      // Asia
      ctx.beginPath();
      ctx.arc(1500, 350, 250, 0, Math.PI * 2);
      ctx.fill();

      // Australia
      ctx.beginPath();
      ctx.arc(1700, 750, 100, 0, Math.PI * 2);
      ctx.fill();

      const texture = new THREE.CanvasTexture(canvas);
      return texture;
    }

    function latLngToVector3(lat, lng, radius = 1) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lng + 180) * (Math.PI / 180);

      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const y = radius * Math.cos(phi);
      const z = radius * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    function addRouteToGlobe(trip) {
      const start = getCityCoords(trip.departure);
      const end = getCityCoords(trip.destination);

      if (!start || !end) return;

      const startVec = latLngToVector3(start.lat, start.lng, 1.02);
      const endVec = latLngToVector3(end.lat, end.lng, 1.02);

      // Create arc
      const curve = new THREE.QuadraticBezierCurve3(
        startVec,
        startVec.clone().add(endVec).multiplyScalar(0.7),
        endVec
      );

      const points = curve.getPoints(50);
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ 
        color: 0xe8b55f, 
        linewidth: 2,
        transparent: true,
        opacity: 0.8
      });
      const line = new THREE.Line(geometry, material);
      
      scene.add(line);
      routeLines.push(line);

      // Add markers
      const startMarker = createMarker();
      startMarker.position.copy(startVec);
      scene.add(startMarker);

      const endMarker = createMarker();
      endMarker.position.copy(endVec);
      scene.add(endMarker);
    }

    function createMarker() {
      const geometry = new THREE.SphereGeometry(0.02, 16, 16);
      const material = new THREE.MeshBasicMaterial({ color: 0xf5d89a });
      return new THREE.Mesh(geometry, material);
    }

    function clearRoutes() {
      routeLines.forEach(line => {
        scene.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      });
      routeLines = [];
      
      // Remove markers
      scene.children.forEach(child => {
        if (child instanceof THREE.Mesh && child !== globe) {
          scene.remove(child);
          child.geometry.dispose();
          child.material.dispose();
        }
      });
    }

    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    renderer.domElement.addEventListener('mousedown', () => {
      isDragging = true;
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;

        globe.rotation.y += deltaX * 0.005;
        globe.rotation.x += deltaY * 0.005;
      }
      previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    renderer.domElement.addEventListener('mouseup', () => {
      isDragging = false;
    });

    function animate() {
      requestAnimationFrame(animate);
      
      if (!isDragging) {
        globe.rotation.y += 0.001;
      }
      
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      const container = document.getElementById('globe-container');
      const width = container.clientWidth;
      const height = container.clientHeight;
      
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });

    // Modal functions
    function openAddTrip() {
      document.getElementById('add-modal').classList.add('active');
    }

    function closeAddTrip() {
      document.getElementById('add-modal').classList.remove('active');
      document.getElementById('trip-form').reset();
    }

    function resetView() {
      globe.rotation.set(0, 0, 0);
      camera.position.set(0, 0, 2.5);
    }

    function viewTrips() {
      const tripsSection = document.getElementById('trips-section');
      const isVisible = tripsSection.style.display !== 'none';
      tripsSection.style.display = isVisible ? 'none' : 'block';
      
      if (!isVisible) {
        renderTripsList();
        tripsSection.scrollIntoView({ behavior: 'smooth' });
      }
    }

    function renderTripsList() {
      const container = document.getElementById('trips-container');
      
      if (trips.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No trips recorded yet.</p>
            <button class="primary" onclick="openAddTrip()">Add Your First Trip</button>
          </div>
        `;
        return;
      }

      container.innerHTML = trips.map((trip, index) => `
        <div class="trip-card" onclick="focusOnTrip(${index})">
          <h3>${trip.name}</h3>
          <div class="route">${trip.departure} → ${trip.destination}</div>
          <div class="dates">
            ${trip.startDate}${trip.endDate ? ' – ' + trip.endDate : ''}
          </div>
        </div>
      `).join('');
    }

    function focusOnTrip(index) {
      const trip = trips[index];
      const coords = getCityCoords(trip.departure);
      if (coords) {
        // Animate globe to show the trip
        const targetRotation = -(coords.lng * Math.PI / 180);
        globe.rotation.y = targetRotation;
        
        // Scroll back to globe
        document.getElementById('globe-container').scrollIntoView({ behavior: 'smooth' });
      }
    }

    // Form submission
    document.getElementById('trip-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const trip = {
        name: document.getElementById('trip-name').value,
        departure: document.getElementById('departure').value,
        destination: document.getElementById('destination').value,
        startDate: document.getElementById('start-date').value,
        endDate: document.getElementById('end-date').value
      };

      const startCoords = getCityCoords(trip.departure);
      const endCoords = getCityCoords(trip.destination);

      if (!startCoords) {
        alert(`Sorry, "${trip.departure}" is not in our database yet. Try a major city nearby.`);
        return;
      }

      if (!endCoords) {
        alert(`Sorry, "${trip.destination}" is not in our database yet. Try a major city nearby.`);
        return;
      }

      trips.push(trip);
      saveTrips(trips);
      addRouteToGlobe(trip);
      
      closeAddTrip();
      
      // Show success feedback
      const btn = document.querySelector('.controls .primary');
      const originalText = btn.textContent;
      btn.textContent = '✓ Trip Added!';
      setTimeout(() => {
        btn.textContent = originalText;
      }, 2000);
    });

    // Initialize on load
    initGlobe();
  </script>
</body>
</html>
